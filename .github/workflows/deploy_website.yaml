# Publishes the Vite app to the gh-pages branch for GitHub Project Pages:
#   https://<owner>.github.io/<repository>/
#
# Requires: Settings → Pages → Source = "Deploy from a branch" → Branch gh-pages / (root).
# .env is not committed; set Repository variables / Secrets for anything you need at build time.

name: Deploy To GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
  pull_request:

jobs:
  deploy-main:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    if: ${{ github.ref == 'refs/heads/main' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: yarn

      - run: yarn install --frozen-lockfile

      # VITE_BASE_PATH must match the Pages URL path (/<repo>/). Without it, CI has no .env and assets 404.
      - name: Build for GitHub Pages
        run: yarn build
        env:
          VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH != '' && vars.VITE_BASE_PATH || format('/{0}/', github.event.repository.name) }}
          VITE_STORAGE_ENGINE: ${{ vars.VITE_STORAGE_ENGINE }}
          VITE_FIREBASE_CONFIG: ${{ secrets.VITE_FIREBASE_CONFIG }}
          VITE_RECAPTCHAV3TOKEN: ${{ secrets.VITE_RECAPTCHAV3TOKEN }}
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_REPO_URL: ${{ vars.VITE_REPO_URL }}
          VITE_USE_HASH_ROUTER: ${{ vars.VITE_USE_HASH_ROUTER }}

      - uses: peaceiris/actions-gh-pages@v4
        name: Deploy
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          # Keep dev/ and PR*/ folders on gh-pages when refreshing the site root.
          keep_files: true

  deploy-dev:
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/dev' }}
    permissions:
      contents: write
    concurrency:
      group: dev-deploy
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: yarn

      - run: yarn install --frozen-lockfile

      - name: Build dev branch
        run: yarn build
        env:
          VITE_BASE_PATH: /dev/

      - uses: peaceiris/actions-gh-pages@v4
        name: Deploy dev branch
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: dev
          keep_files: true

  pr-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    if: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/dev' }}

    steps:
      - name: Comment on PR
        uses: hasura/comment-progress@v2.2.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          number: ${{ github.event.pull_request.number }}
          id: deploy-preview
          message: Starting deployment of preview ⏳...

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: yarn

      - run: yarn install --frozen-lockfile

      - name: Build PR preview
        run: yarn build
        env:
          VITE_BASE_PATH: ${{ format('/{0}/PR{1}/', github.event.repository.name, github.event.pull_request.number) }}
          VITE_STORAGE_ENGINE: ${{ vars.VITE_STORAGE_ENGINE }}
          VITE_FIREBASE_CONFIG: ${{ secrets.VITE_FIREBASE_CONFIG }}
          VITE_RECAPTCHAV3TOKEN: ${{ secrets.VITE_RECAPTCHAV3TOKEN }}
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_REPO_URL: ${{ vars.VITE_REPO_URL }}
          VITE_USE_HASH_ROUTER: ${{ vars.VITE_USE_HASH_ROUTER }}

      - name: Push PR deploy preview
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: PR${{ github.event.pull_request.number }}
          keep_files: true

      - name: Update comment
        uses: hasura/comment-progress@v2.2.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          number: ${{ github.event.pull_request.number }}
          id: deploy-preview
          message: |
            A preview of this PR is on **gh-pages** under **PR${{ github.event.pull_request.number }}**.

            Open: `https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/PR${{ github.event.pull_request.number }}/`

            (If routing fails on refresh, set repo variable **VITE_USE_HASH_ROUTER** to `true` and rebuild.)
